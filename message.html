<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Two‑Person Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .chat-container {
      max-width: 800px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      height: 80vh;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header h1 {
      font-size: 20px;
      margin: 0;
    }

    .chat-messages {
      flex: 1;
      padding: 16px 24px;
      overflow-y: auto;
      background: #f7f8fc;
    }

    .message {
      margin-bottom: 12px;
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 16px;
      position: relative;
      clear: both;
    }

    .message .sender {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    .message.me {
      margin-left: auto;
      background: #0d6efd;
      color: #fff;
      border-bottom-right-radius: 2px;
      text-align: right;
    }

    .message.me .sender {
      color: rgba(255,255,255,0.8);
    }

    .message.them {
      margin-right: auto;
      background: #ffffff;
      color: #333;
      border: 1px solid #e2e6f0;
      border-bottom-left-radius: 2px;
    }

    .message-text {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
    }

    .message-time {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 4px;
    }

    .chat-input-area {
      border-top: 1px solid #eee;
      padding: 10px 16px;
      background: #fff;
    }

    .chat-input-area .form-select,
    .chat-input-area .form-control {
      border-radius: 999px;
    }

    .chat-input-area .btn-send {
      border-radius: 999px;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <h1>Two‑Person Chat</h1>
      <small class="text-muted">Real‑time chat between two people</small>
    </div>

    <div class="p-3 border-bottom bg-light">
      <form id="nameForm" class="row g-2 align-items-center">
        <div class="col-12 col-md-8">
          <input
            id="usernameInput"
            type="text"
            class="form-control"
            placeholder="Enter your name (e.g. Bryan, Person A)"
            autocomplete="off"
            required
          >
        </div>
        <div class="col-12 col-md-4 d-grid">
          <button type="submit" class="btn btn-outline-primary">Set my name</button>
        </div>
      </form>
      <small id="nameStatus" class="text-muted d-block mt-1"></small>
    </div>

    <div id="chatMessages" class="chat-messages">
      <!-- Messages from all users will appear here -->
    </div>

    <div class="chat-input-area">
      <form id="chatForm" class="row g-2 align-items-center">
        <div class="col-12 col-md-10">
          <input
            id="messageInput"
            type="text"
            class="form-control"
            placeholder="Type a message and press Enter..."
            autocomplete="off"
            required
          >
        </div>
        <div class="col-12 col-md-2 d-grid">
          <button type="submit" class="btn btn-primary btn-send">Send</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Socket.IO client loaded from Render backend -->
  <script src="https://eagld-chat.onrender.com/socket.io/socket.io.js"></script>

  <script>
    // Connect to the Socket.IO server running on Render
    const socket = io('https://eagld-chat.onrender.com');

    const nameForm = document.getElementById('nameForm');
    const usernameInput = document.getElementById('usernameInput');
    const nameStatus = document.getElementById('nameStatus');

    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');
    const chatMessages = document.getElementById('chatMessages');

    let username = "";

    function formatTime(date) {
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(sender, text, isSelf) {
      const wrapper = document.createElement('div');
      wrapper.className = 'message ' + (isSelf ? 'me' : 'them');

      const now = new Date();

      wrapper.innerHTML = `
        <div class="sender">${sender}</div>
        <p class="message-text"></p>
        <div class="message-time">${formatTime(now)}</div>
      `;

      wrapper.querySelector('.message-text').textContent = text;

      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    nameForm.addEventListener('submit', function (e) {
      e.preventDefault();
      const value = usernameInput.value.trim();
      if (!value) return;

      username = value;
      usernameInput.disabled = true;
      this.querySelector('button[type="submit"]').disabled = true;
      nameStatus.textContent = 'You are chatting as "' + username + '". Open this page on another device and set a different name for the other person.';
    });

    chatForm.addEventListener('submit', function (e) {
      e.preventDefault();
      if (!username) {
        alert('Set your name first at the top.');
        return;
      }

      const text = messageInput.value.trim();
      if (!text) return;

      socket.emit('chat message', {
        user: username,
        text: text
      });

      messageInput.value = '';
      messageInput.focus();
    });

    socket.on('chat message', function (data) {
      const isSelf = data.user === username;
      addMessage(data.user, data.text, isSelf);
    });
  </script>
</body>
</html>
